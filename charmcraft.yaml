name: ubuntu-release-metrics-collector
type: charm
title: Ubuntu Release Metrics Collector
summary: Metrics collectors for Ubuntu Release Management - to be sent to an InfluxDB hooked up to a Grafana dashboard
description: |
  Each metric collects data, and then sends it to an InfluxDB as specified in the juju config. The metrics can be run as a dry run.

links:
  source:
    - https://github.com/ubuntu/ubuntu-release-metrics/

base: ubuntu@24.04
platforms:
  amd64:

charm-libs:
  - lib: traefik_k8s.ingress
    version: "2"

parts:
  ubuntu-release-metrics:
    source: .
    plugin: dump
  charm:
    source: .
    plugin: charm
    charm-entrypoint: charm/charm.py
    charm-requirements: [charm_requirements.txt]

requires:
  ingress:
    interface: ingress
    limit: 1
    optional: true

actions:
  get-influxdb-grafana-password:
    description: Get the password for the 'grafana' user to connect to the self-hosted InfluxDB
    additionalProperties: false

config:
  options:
    dry_run:
      description: |
        Run the metrics in dry run or not.
      default: false
      type: boolean
